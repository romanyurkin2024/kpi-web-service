services:
  postgres:
    image: postgres:16
    container_name: kpi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kpi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kpi_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kpi_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      EXT_PG_ENABLED: ${EXT_PG_ENABLED:-false}
      EXT_PG_HOST: ${EXT_PG_HOST:-}
      EXT_PG_PORT: ${EXT_PG_PORT:-5432}
      EXT_PG_USER: ${EXT_PG_USER:-}
      EXT_PG_PASSWORD: ${EXT_PG_PASSWORD:-}
      EXT_PG_DATABASE: ${EXT_PG_DATABASE:-}
      ORACLE_ENABLED: ${ORACLE_ENABLED:-false}
      ORACLE_HOST: ${ORACLE_HOST:-}
      ORACLE_PORT: ${ORACLE_PORT:-1521}
      ORACLE_USER: ${ORACLE_USER:-}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-}
      ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kpi.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_admin_password}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kpi_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  postgres_data:
    name: kpi_postgres_data
